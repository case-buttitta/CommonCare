services:
  db:
    profiles: ["dev", "prod"]
    image: postgres:15-alpine
    container_name: commoncare-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: commoncare
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./db:/db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    profiles: ["dev", "prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commoncare-backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/commoncare
      SECRET_KEY: docker-secret-key
      FLASK_ENV: development
      DB_EXPORT_PATH: /db/init.sql
    ports:
      - "5001:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./db:/db
    restart: on-failure
    command: >
      sh -c "
        echo 'Waiting for DB to be ready...';
        until pg_isready -h db -p 5432 -U postgres; do sleep 2; done;
        echo 'DB ready! Starting backend...';
        python run.py
      "

  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
