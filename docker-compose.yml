services:
  backend:
    profiles: ["dev", "prod"]
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: commoncare-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: docker-secret-key
      FLASK_ENV: development
      DB_EXPORT_PATH: /db/init.sql
    ports:
      - "5001:5000"
    volumes:
      - ./backend:/app
      - ./db:/db
    restart: on-failure
    command: >
      sh -c "
        echo 'Starting backend...';
        python run.py
      "

  frontend:
    profiles: ["dev"]
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
