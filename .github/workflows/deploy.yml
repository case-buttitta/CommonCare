name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1: Backend tests (pytest)
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  test-backend:
    name: Backend Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run pytest
        run: pytest
        env:
          SECRET_KEY: ci-test-secret-key

# ──────────────────────────────────────────────────────────────────────────────
# JOB 2: Frontend tests (vitest)
# ──────────────────────────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend Tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run vitest
        run: npm test
        working-directory: frontend

# ──────────────────────────────────────────────────────────────────────────────
# JOB 3: Build — only runs after both test jobs pass
# ──────────────────────────────────────────────────────────────────────────────
  build:
    name: Build Frontend
    needs: [test-backend, test-frontend]
    # Skip the build (and deploy) on pull requests — tests are the gate there
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build for GitHub Pages
        run: npm run build
        working-directory: frontend
        env:
          GITHUB_PAGES: true
          VITE_API_URL: https://backend-production-3564d.up.railway.app

      - name: Copy index.html as 404.html for SPA routing
        run: cp frontend/dist/index.html frontend/dist/404.html

      - name: Add .nojekyll to prevent Jekyll processing
        run: touch frontend/dist/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

# ──────────────────────────────────────────────────────────────────────────────
# JOB 4: Deploy — only runs after a successful build
# ──────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
